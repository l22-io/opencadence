name: New Data Source
description: Propose a new metric or data source
labels: ["metric-request"]
body:
  - type: textarea
    id: metric
    attributes:
      label: Metric Description
      description: What metric or data source do you want to add?
      placeholder: |
        - Metric name: e.g. blood_pressure_systolic
        - Unit: e.g. mmHg
        - Source: e.g. Apple Watch via HealthKit
    validations:
      required: true
  - type: textarea
    id: range
    attributes:
      label: Valid Range
      description: What is the physiologically valid range for this metric?
      placeholder: "e.g. 60-250 mmHg"
    validations:
      required: true
  - type: textarea
    id: fhir
    attributes:
      label: FHIR Mapping
      description: If known, what FHIR Observation code should this map to?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Use cases, references, or clinical relevance.
    validations:
      required: false
